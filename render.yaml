services:
  - type: web
    name: messenger-deepseek-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false
      - key: MESSENGER_API_BASE_URL
        value: https://graph.facebook.com/v23.0
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: MODEL_TEMPERATURE
        value: 0.4
      - key: MODEL_MAX_TOKENS
        value: 120
      - key: MAX_MEMORY_MESSAGES
        value: 8
      - key: REQUEST_TIMEOUT_MS
        value: 5000
      - key: IMAGE_ANALYSIS_PROVIDER
        value: none
      - key: APP_ENV
        value: production
