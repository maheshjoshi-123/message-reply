services:
  - type: web
    name: messenger-deepseek-bot
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: VERIFY_TOKEN
        sync: false
      - key: PAGE_ACCESS_TOKEN
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_BASE_URL
        value: https://api.deepseek.com
      - key: DEEPSEEK_MODEL
        value: deepseek-chat
      - key: MODEL_TEMPERATURE
        value: 0.4
      - key: MODEL_MAX_TOKENS
        value: 120
      - key: MEMORY_WINDOW
        value: 8
      - key: APP_ENV
        value: production
